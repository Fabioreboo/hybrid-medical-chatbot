<!DOCTYPE html>
<html lang="en" data-theme="claude" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-powered medical chatbot for symptom analysis and drug information.">
    <title>MediChat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/claude_element.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-bg-100 text-text-100 font-ui antialiased">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar bg-bg-200" id="sidebar">
            <div class="sidebar-header">
                <button id="newChatBtn" class="new-chat-btn">
                    <div class="new-chat-content">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        <span>New chat</span>
                    </div>
                </button>
            </div>
            <div class="sidebar-nav">
                <div id="threadList" class="thread-list">
                    <!-- Dynamic threads -->
                    <div class="thread-section" id="todayThreads">
                        <h3 class="thread-heading">All Chats</h3>
                        <div class="thread-items"></div>
                    </div>
                </div>
            </div>
            <div class="sidebar-footer">
                <div class="user-profile">
                    <div class="avatar-small">U</div>
                    <span class="user-name">User</span>
                </div>
            </div>
        </aside>

        <!-- Main Content (Chat Area) -->
        <main class="main-content">
            <!-- Header -->
            <header class="chat-header">
                <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                </button>
                <div class="model-selector">
                    <span>MediChat Assistant</span>
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="chevron"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </div>
            </header>

            <div class="chat-area" id="chatMessages">
                <!-- Welcome Screen -->
                <div class="welcome-screen" id="welcomeScreen">
                    <div class="welcome-avatar-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="welcome-icon">
                            <path d="M12 2L12 22M2 12L22 12" stroke-linecap="round"/>
                            <circle cx="12" cy="12" r="10"/>
                        </svg>
                    </div>
                    <h1 class="welcome-title">Good afternoon</h1>
                    <p class="welcome-subtitle">I'm MediChat, an AI assistant to help you understand your symptoms.</p>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                 <span class="typing-dots"><span></span><span></span><span></span></span>
                 <span class="typing-text">MediChat is typing...</span>
            </div>

            <div class="input-container">
                <div class="input-box bg-bg-200">
                    <div class="input-inner">
                        <textarea id="messageInput" placeholder="Message MediChat..." rows="1" aria-label="Message text"></textarea>
                    </div>
                    <div class="input-actions">
                        <div class="action-left">
                            <button class="icon-btn tool-btn" title="Add attachment" disabled><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"></path></svg></button>
                        </div>
                        <div class="action-right">
                            <button id="sendBtn" class="send-btn" disabled>
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                            </button>
                        </div>
                    </div>
                </div>
                <div class="input-disclaimer text-text-300">
                    Medical information only. Not a substitute for professional medical advice.
                </div>
            </div>
        </main>
    </div>
    
    <script src="/static/js/chat.js"></script>
</body>
</html>
